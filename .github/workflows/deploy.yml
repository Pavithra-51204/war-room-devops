name: CI/CD — Corporate War Room

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Infisical CLI ───────────────────────────────
      - name: Install Infisical
        run: |
          curl -1sLf \
            'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' \
            | sudo -E bash
          sudo apt-get install -y infisical

      # ── 3. Fetch secrets from Infisical ───────────────────────
      #    Strips quotes so Docker receives raw strings.
      #    Loads into $GITHUB_ENV for use in subsequent run: steps.
      - name: Fetch Secrets from Infisical
        env:
          INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
        run: |
          infisical export --env=dev --format=dotenv > .env
          sed -i "s/[\"']//g" .env
          cat .env >> $GITHUB_ENV

      # ── 4. Docker login + build + push ────────────────────────
      - name: Docker Login
        run: |
          echo "${{ env.DOCKER_PASSWORD }}" \
            | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push image
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/war-room-backend ./server
          docker push ${{ env.DOCKER_USERNAME }}/war-room-backend

# ── 5. SSH deploy to EC2 ──────────────────────────────────
      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          timeout:  120s
          script: |
            set -e

            # Login to Docker Hub on EC2
            echo "${{ env.DOCKER_PASSWORD }}" \
              | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

            # Pull the fresh image
            docker pull ${{ env.DOCKER_USERNAME }}/war-room-backend

            # Clean up old container
            docker stop warroom 2>/dev/null || true
            docker rm   warroom 2>/dev/null || true

            # 🔥 THE CRITICAL FIX: Use the path we found with 'find'
            docker run -d \
              --name warroom \
              --restart unless-stopped \
              -p 4000:4000 \
              --env-file /home/ubuntu/war-room-devops/server/.env \
              ${{ env.DOCKER_USERNAME }}/war-room-backend

            # Health check
            sleep 6
            curl -sf http://localhost:4000/health \
              && echo "Deployment successful" \
              || (echo "Health check failed" && docker logs warroom --tail 30 && exit 1)