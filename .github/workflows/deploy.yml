name: CI/CD with Infisical

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout code
    - name: Checkout
      uses: actions/checkout@v3

    # 2. Install Infisical CLI
    - name: Install Infisical
      run: |
        curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
        sudo apt-get install infisical -y

    # 3. Fetch and Load Secrets into Environment
    - name: Fetch Secrets
      env:
        INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
      run: |
        # Export secrets to a temp file
        infisical export --env=dev --format=dotenv > .env
        
        # This part is key: It reads the file and tells GitHub 
        # "These are my environment variables now"
        cat .env >> $GITHUB_ENV

    # 4. Login to Docker Hub
    - name: Docker Login
      run: |
        echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin

    # 5. Build & Push Docker Image
    - name: Build and Push
      run: |
        docker build -t ${{ env.DOCKER_USERNAME }}/war-room-backend ./server
        docker push ${{ env.DOCKER_USERNAME }}/war-room-backend

    # 6. Deploy to EC2
    - name: SSH Deploy
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ env.EC2_HOST }}
        username: ${{ env.EC2_USER }}
        key: ${{ env.EC2_SSH_KEY }}
        script: |
          # We log in to Docker Hub on the EC2 as well to pull the private image
          echo "${{ env.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin
          docker stop warroom || true
          docker rm warroom || true
          docker pull ${{ env.DOCKER_USERNAME }}/war-room-backend
          docker run -d -p 4000:4000 --env-file .env --name warroom ${{ env.DOCKER_USERNAME }}/war-room-backend